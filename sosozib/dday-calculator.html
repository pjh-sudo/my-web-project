<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디데이 계산기 - 소소집</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo" style="text-decoration: none;">SOSOZIB</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <section class="tool-detail-section">
        <div class="tool-container" style="max-width: 500px;">
            <h2>디데이 계산기 📅</h2>
            <p>중요한 날짜를 입력하면 남은 날(또는 지난 날)을 알려드려요.</p>
            
            <div class="dday-setup">
                <input type="text" id="dday-title" placeholder="무슨 날인가요? (예: 내 생일, 수능)">
                <input type="date" id="dday-date">
                <button onclick="calculateDday()">계산하기</button>
            </div>

            <div class="dday-result-box">
                <h3 id="result-title">목표일까지</h3>
                <div class="dday-number" id="result-number">D - ?</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-logo">SOSOZIB</div>
        <div class="footer-copy">© 2024 SOSOZIB</div>
    </footer>

    <script src="dday.js"></script>
</body>
</html>
