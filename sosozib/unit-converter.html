<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단위 변환기 - 소소집</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">
</head>
<body>
    <header>
        <a href="index.html" class="logo" style="text-decoration: none;">SOSOZIB</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <section class="tool-detail-section">
        <div class="tool-container" style="max-width: 600px; margin: 0 auto;">
            <h2>단위 변환기 📏</h2>
            <p>헷갈리는 단위를 쉽고 빠르게 변환해 보세요.</p>
            
            <div class="converter-box">
                <select id="unit-type" class="unit-select">
                    <option value="length">길이 (인치 ↔ 센티미터)</option>
                    <option value="area">면적 (평 ↔ 제곱미터)</option>
                    <option value="weight">무게 (파운드 ↔ 킬로그램)</option>
                </select>

                <div class="convert-inputs">
                    <div class="input-group">
                        <label id="label-from">인치 (inch)</label>
                        <input type="number" id="input-from" placeholder="0">
                    </div>
                    <div class="switch-icon">⇄</div>
                    <div class="input-group">
                        <label id="label-to">센티미터 (cm)</label>
                        <input type="number" id="input-to" placeholder="0">
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <section class="seo-text-section">
        <article class="seo-article">
            </article>
    </section>

    <footer>
        <div class="footer-logo">SOSOZIB</div>
        <div class="footer-copy">© 2026 SOSOZIB</div>
    </footer>

    <script src="converter.js"></script>
</body>
</html>
