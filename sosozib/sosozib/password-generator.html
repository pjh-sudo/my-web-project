<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 생성기 - 소소집</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo" style="text-decoration: none;">SOSOZIB</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <section class="tool-detail-section">
        <div class="tool-container">
            <h2>랜덤 비밀번호 생성기</h2>
            <p>클릭 한 번으로 안전하고 복잡한 비밀번호를 만들어 드려요.</p>
            
            <div class="password-display">
                <input type="text" id="password-result" readonly placeholder="여기에 비밀번호가 표시됩니다">
                <button id="copy-btn" onclick="copyPassword()">복사</button>
            </div>

            <button class="generate-btn" onclick="generatePassword()">비밀번호 생성하기</button>
        </div>
    </section>

    <footer>
        <div class="footer-logo">SOSOZIB</div>
        <div class="footer-copy">© 2024 SOSOZIB</div>
    </footer>

    <script src="password.js"></script>
</body>
</html>
